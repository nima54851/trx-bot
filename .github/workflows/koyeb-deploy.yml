name: Deploy to Koyeb

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Koyeb App
        id: create-app
        run: |
          curl -s -X POST "https://app.koyeb.com/v1/deployments" \
            -H "Authorization: Bearer ${{ secrets.KOYEB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "trx-bot",
              "type": "web_service",
              "git": {
                "repository": "nima54851/trx-bot",
                "branch": "main",
                "dockerfile_path": "Dockerfile.backend"
              },
              "env": [
                {"key": "TRON_NETWORK", "value": "mainnet"},
                {"key": "ENERGY_PRICE_PER_DAY", "value": "0.5"},
                {"key": "ADMIN_PASSWORD", "value": "admin123"},
                {"key": "DATABASE_URL", "value": "sqlite:///./trxbot.db"}
              ],
              "region": "fra"
            }' | tee $GITHUB_OUTPUT
